name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TwitchChatOverlay/TwitchChatOverlay.csproj

      - name: Build
        run: dotnet build TwitchChatOverlay/TwitchChatOverlay.csproj --configuration Release --no-restore

      - name: Publish Release (self-contained, single file)
        run: >
          dotnet publish TwitchChatOverlay/TwitchChatOverlay.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:TwitchClientId=${{ secrets.TWITCH_CLIENT_ID }}
          -p:YouTubeClientId=${{ secrets.YOUTUBE_CLIENT_ID }}
          -p:YouTubeClientSecret=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          --output ./publish/release

      - name: Verify Release bundled policy docs
        run: |
          $requiredFiles = @(
            './publish/release/Docs/PrivacyPolicy.html',
            './publish/release/Docs/TermsOfUse.html'
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Required bundled document is missing from release publish output: $file"
            }
          }

      - name: Publish Debug (self-contained, single file)
        run: >
          dotnet publish TwitchChatOverlay/TwitchChatOverlay.csproj
          --configuration Debug
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:TwitchClientId=${{ secrets.TWITCH_CLIENT_ID }}
          -p:YouTubeClientId=${{ secrets.YOUTUBE_CLIENT_ID }}
          -p:YouTubeClientSecret=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          --output ./publish/debug

      - name: Verify Debug bundled policy docs
        run: |
          $requiredFiles = @(
            './publish/debug/Docs/PrivacyPolicy.html',
            './publish/debug/Docs/TermsOfUse.html'
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Required bundled document is missing from debug publish output: $file"
            }
          }

      - name: Upload Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: TwitchChatOverlay-win-x64-release
          path: ./publish/release/

      - name: Upload Debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: TwitchChatOverlay-win-x64-debug
          path: ./publish/debug/
