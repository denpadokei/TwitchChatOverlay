name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TwitchChatOverlay/TwitchChatOverlay.csproj

      - name: Extract version from tag
        id: version
        run: echo "VERSION=$('${{ github.ref_name }}' -replace '^v', '')" >> $env:GITHUB_OUTPUT

      - name: Publish (self-contained, single file)
        run: >
          dotnet publish TwitchChatOverlay/TwitchChatOverlay.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:TwitchClientId=${{ secrets.TWITCH_CLIENT_ID }}
          --output ./publish

      - name: Zip artifacts
        run: Compress-Archive -Path ./publish/* -DestinationPath TwitchChatOverlay-${{ github.ref_name }}-win-x64.zip

      - name: Generate SHA256 checksum
        run: |
          $zip = "TwitchChatOverlay-${{ github.ref_name }}-win-x64.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Out-File -FilePath "$zip.sha256" -Encoding utf8NoBOM

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TwitchChatOverlay-${{ github.ref_name }}-win-x64.zip
            TwitchChatOverlay-${{ github.ref_name }}-win-x64.zip.sha256
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
