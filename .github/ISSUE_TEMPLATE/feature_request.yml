name: 💡 機能要望
description: 新機能や改善のアイデアを提案する
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能要望ありがとうございます。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どんな問題や不便さを感じていますか？
      placeholder: 例）現在は通知の色を変更できないため、種類の区別がしづらい
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能があると解決できますか？
      placeholder: 例）通知の種類ごとに色をカスタマイズできるようにしてほしい
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案（あれば）
      description: 他に考えられる解決策があれば記入してください

  - type: textarea
    id: additional
    attributes:
      label: その他・補足
