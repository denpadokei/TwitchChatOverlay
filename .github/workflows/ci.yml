name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore TwitchChatOverlay/TwitchChatOverlay.csproj

      - name: Build
        run: dotnet build TwitchChatOverlay/TwitchChatOverlay.csproj --configuration Release --no-restore
